name: Debian package

on:
  push:
    branches:
      - develop
    paths:
      - "debian/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "internal/**"
      - ".github/workflows/debian-build.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "debian/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "internal/**"
      - ".github/workflows/debian-build.yml"

permissions:
  contents: read

jobs:
  debian:
    uses: Glyndor/.github/.github/workflows/rust-debian.yml@7f386e098ac242fc82e2e9a2b5e02c50cf00eedf # v1.10.0-pre
    with:
      package-name: podup
      check-vendored: true
      offline-cargo-args: "--no-default-features --features watch,completions"
