name: Debian package

on:
  push:
    branches:
      - develop
    paths:
      - "debian/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "internal/**"
      - ".github/workflows/debian-build.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "debian/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "internal/**"
      - ".github/workflows/debian-build.yml"

permissions:
  contents: read

jobs:
  debian:
    uses: Glyndor/.github/.github/workflows/rust-debian.yml@505d78df893bfc2f73261ff285529e6afd46f5ac # v1.9.1
    with:
      package-name: podup
      check-vendored: true
      offline-cargo-args: "--no-default-features --features watch,completions"
