name: Debian package

on:
  push:
    branches:
      - develop
    paths:
      - "debian/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "internal/**"
      - ".github/workflows/debian-build.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "debian/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "internal/**"
      - ".github/workflows/debian-build.yml"

permissions:
  contents: read

jobs:
  debian:
    uses: Glyndor/.github/.github/workflows/rust-debian.yml@e22b97f79921a0a1d37d18d91e0ce62aac4f56cd # v1.9.0
    with:
      package-name: podup
      check-vendored: true
      offline-cargo-args: "--no-default-features --features watch,completions"
