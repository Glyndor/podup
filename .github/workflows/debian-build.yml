name: Debian package

on:
  push:
    branches:
      - develop
    paths:
      - "debian/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "internal/**"
      - ".github/workflows/debian-build.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "debian/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "internal/**"
      - ".github/workflows/debian-build.yml"

permissions:
  contents: read

jobs:
  debian:
    uses: Glyndor/.github/.github/workflows/rust-debian.yml@1f162c71fdb2fff2a40eba6bf0435b9032584a13 # v1.6.2
    with:
      package-name: podup
      check-vendored: true
      offline-cargo-args: "--no-default-features --features watch,completions"
