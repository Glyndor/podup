name: podman-lane
# Live-Podman integration for podup, validated against the FULL supported window.
# Support policy: the latest Podman major + the one below it — today Podman 5 and 6.
# Every engine PR runs the integration suite on BOTH majors (matrix), each inside a
# Fedora qemu VM booted in the runner (nested-virt — the ubuntu-24.04 runner exposes
# /dev/kvm) with full systemd, as a rootless user. Podman 6 = Fedora rawhide;
# Podman 5 = Fedora 44.
on:
  workflow_dispatch:
  # Nightly safety net on the default branch: catches a runtime regression that
  # slipped past PR review within 24h (a scheduled run reports on the default branch).
  schedule:
    - cron: "0 9 * * *"
  # Runs on EVERY pull request (no path filter) so it can be a required status
  # check that always reports — runtime behaviour is podup's whole point, so it
  # gates the merge. The internal suite distinguishes nested-virt flakes from real
  # failures and retries a transient once.
  pull_request:
permissions:
  contents: read
jobs:
  podman-vm:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        podman: ["5", "6"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install qemu + cloud tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-system-x86 qemu-utils cloud-image-utils
      - name: Fetch Fedora cloud image (Podman 6 = rawhide, 5 = Fedora 44)
        run: |
          SEL="${{ matrix.podman }}"
          echo "PODMAN_MAJOR=$SEL"
          if [ "$SEL" = "5" ]; then
            base="https://dl.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/"
            img=$(curl -fsSL "$base" | grep -oE 'Fedora-Cloud-Base-Generic-44-[0-9.]+\.x86_64\.qcow2' | sort -u | tail -1)
          else
            base="https://dl.fedoraproject.org/pub/fedora/linux/development/rawhide/Cloud/x86_64/images/"
            img=$(curl -fsSL "$base" | grep -oE 'Fedora-Cloud-Base-Generic-Rawhide-[0-9]+\.n\.[0-9]+\.x86_64\.qcow2' | sort -u | tail -1)
          fi
          [ -n "$img" ] || { echo "::error::could not resolve a Fedora image name for Podman $SEL at $base"; exit 1; }
          echo "image: $img"
          # The rawhide qcow2 is ~500 MB and the mirror occasionally drops the
          # connection mid-transfer (curl exit 18). Resume + retry so a transient
          # network blip doesn't fail the lane.
          curl -fSL --retry 5 --retry-delay 5 --retry-all-errors -C - -o "$RUNNER_TEMP/vm.qcow2" "${base}${img}"
          qemu-img resize "$RUNNER_TEMP/vm.qcow2" 40G
      - name: Build cloud-init seed (script-file for clean RC)
        run: |
          cat > "$RUNNER_TEMP/user-data" <<'EOF'
          #cloud-config
          growpart: {mode: auto, devices: ['/']}
          resize_rootfs: true
          users:
            - name: tester
              sudo: 'ALL=(ALL) NOPASSWD:ALL'
              shell: /bin/bash
          write_files:
            - path: /usr/local/bin/run-suite.sh
              permissions: '0755'
              content: |
                #!/bin/bash
                export XDG_RUNTIME_DIR=/run/user/$(id -u)
                systemctl --user start podman.socket
                export PODMAN_SOCKET=$XDG_RUNTIME_DIR/podman/podman.sock
                # In here Podman is guaranteed, so a test that cannot reach it
                # must fail rather than skip: a skipped test reports `ok`, and a
                # VM whose socket never came up would otherwise look like a
                # flawless 155-pass run and clear the floor comfortably.
                export PODUP_REQUIRE_PODMAN=1
                cd "$HOME/podup" || exit 90
                # Capture the FULL output: the per-failure detail (where the flake
                # marker lives) precedes the summary, so a `tail` on the console
                # would truncate it and hide why a test failed.
                # Retry once on a nested-virt transient (a connection drop surfaces
                # as Hyper(IncompleteMessage) and kin). A real failure reproduces on
                # the second run, so this stabilises the lane for required-check gating
                # without masking genuine bugs.
                for attempt in 1 2; do
                  cargo test --features test-helpers --test engine_integration > /tmp/cargo.log 2>&1
                  RC=$?
                  [ "$RC" -eq 0 ] && break
                  grep -qE 'IncompleteMessage|connection closed before message completed|channel closed|Connection reset' /tmp/cargo.log || break
                  echo "=== nested-virt transient on attempt $attempt; retrying suite ==="
                done
                tail -60 /tmp/cargo.log
                echo "=== failures section (full) ==="
                sed -n '/^failures:$/,/^test result:/p' /tmp/cargo.log | head -120
                # Machine-readable summary computed from the FULL log. A nested-virt
                # connection drop surfaces as Hyper(IncompleteMessage) (and kin);
                # everything else counts as a real failure.
                PASS=$(grep -oE 'test result: .* [0-9]+ passed' /tmp/cargo.log | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+' | tail -1)
                FAIL=$(grep -oE '[0-9]+ failed' /tmp/cargo.log | grep -oE '[0-9]+' | tail -1)
                FLAKY=$(grep -cE 'IncompleteMessage|connection closed before message completed|channel closed|Connection reset' /tmp/cargo.log)
                echo "PODUP_TESTS_RC=$RC"
                echo "PODUP_SUMMARY pass=${PASS:-0} fail=${FAIL:-0} flaky=${FLAKY:-0}"
                # Emit the IDENTITIES of the failing tests, not just the count.
                # The floor gate can only tighten to a per-test known-flaky
                # allowlist once the flaky set is small and stable (#1039), and
                # building that allowlist starts with observing which tests
                # actually fail across nested-virt runs — which the count alone
                # cannot tell you. cargo prints a final `failures:` block of bare
                # test names (the earlier block carries `---- name stdout ----`
                # detail lines, which the 4-space-exact match skips); no failures
                # yields an empty list, not an error.
                FAILED_TESTS=$(sed -n '/^failures:$/,/^test result:/p' /tmp/cargo.log | grep -oE '^    [A-Za-z0-9_:]+$' | tr -d ' ' | paste -sd, -)
                echo "PODUP_FAILED_TESTS=${FAILED_TESTS}"
          runcmd:
            - bash -c 'F=$(findmnt -no FSTYPE /); case $F in btrfs) btrfs filesystem resize max / ;; xfs) xfs_growfs / ;; ext4) resize2fs $(findmnt -no SOURCE /) ;; esac >/dev/console 2>&1; echo "DISK=$(df -h / | tail -1)" >/dev/console'
            - bash -c 'dnf install -y podman rust cargo gcc git >/dev/console 2>&1'
            - bash -c 'echo "PODMAN=$(podman --version)  RUST=$(rustc --version)" >/dev/console'
            - bash -c 'echo "tester:100000:65536" >/etc/subuid; echo "tester:100000:65536" >/etc/subgid'
            - bash -c 'loginctl enable-linger tester; sleep 6'
            - bash -c 'mkdir -p /mnt/repo && mount -t 9p -o trans=virtio,version=9p2000.L repo /mnt/repo && cp -a /mnt/repo /home/tester/podup && chown -R tester:tester /home/tester/podup'
            - bash -c 'sudo -iu tester /usr/local/bin/run-suite.sh >/dev/console 2>&1'
            - bash -c 'echo PROBE_DONE >/dev/console; sleep 2; poweroff'
          EOF
          cloud-localds "$RUNNER_TEMP/seed.iso" "$RUNNER_TEMP/user-data"
      - name: Boot VM (9p = repo only) + capture
        run: |
          sudo timeout 2700 qemu-system-x86_64 -enable-kvm -cpu host -m 6144 -smp 4 \
            -drive file="$RUNNER_TEMP/vm.qcow2",if=virtio,format=qcow2 \
            -drive file="$RUNNER_TEMP/seed.iso",if=virtio,format=raw \
            -netdev user,id=n0 -device virtio-net-pci,netdev=n0 \
            -virtfs local,path=${{ github.workspace }},mount_tag=repo,security_model=none,id=repo \
            -display none -serial stdio 2>&1 | tee "$RUNNER_TEMP/vm.log" || true
      - name: Verify podup core suite passed on the target Podman
        run: |
          L="$RUNNER_TEMP/vm.log"
          echo "=== key lines ==="; grep -E 'DISK=|PODMAN=|test result:|PODUP_TESTS_RC|No space' "$L" | tail -10 || true
          grep -q 'No space left' "$L" && { echo "::error::VM disk full — run invalid"; exit 1; }
          VER=$(grep -oE 'PODMAN=podman version [0-9.]+' "$L" | grep -oE '[0-9.]+' | tail -1)
          grep -qE 'PODMAN=podman version [0-9]' "$L" || { echo "::error::Podman not detected in VM"; exit 1; }
          # Guard the matrix: the VM must actually run the Podman major it was asked to.
          case "$VER" in
            ${{ matrix.podman }}.*) : ;;
            *) echo "::error::expected Podman ${{ matrix.podman }}.x but VM has $VER"; exit 1 ;;
          esac
          # Read the machine-readable summary the VM computed from the FULL cargo
          # log (the console here is tail-truncated, so don't recount from it).
          SUM=$(grep -oE 'PODUP_SUMMARY pass=[0-9]+ fail=[0-9]+ flaky=[0-9]+' "$L" | tail -1)
          [ -n "$SUM" ] || { echo "::error::no PODUP_SUMMARY from VM on Podman $VER — suite did not report"; exit 1; }
          PASS=$(echo "$SUM" | grep -oE 'pass=[0-9]+' | cut -d= -f2)
          FAIL=$(echo "$SUM" | grep -oE 'fail=[0-9]+' | cut -d= -f2)
          FLAKY=$(echo "$SUM" | grep -oE 'flaky=[0-9]+' | cut -d= -f2)
          PASS=${PASS:-0}; FAIL=${FAIL:-0}; FLAKY=${FLAKY:-0}
          echo "Podman $VER: $PASS passed, $FAIL failed ($FLAKY look like connection-drop flakes)"
          # Strip CR: the VM talks to us over `-serial stdio`, so every line of
          # this log arrives CRLF-terminated. The counts survive because they are
          # extracted with numeric patterns, but the identity list keeps the CR on
          # its final element — which then matches nothing in the classified list
          # and reports the last failing test as an unexpected regression. That is
          # exactly how this gate false-reddened on its first run.
          FAILED_TESTS=$(grep -oE 'PODUP_FAILED_TESTS=.*' "$L" | tail -1 | cut -d= -f2- | tr -d '\r' || true)
          if [ -n "$FAILED_TESTS" ]; then
            echo "Failing tests on Podman $VER: $FAILED_TESTS"
          fi
          # Identity gate, per major, when that major has a classified list.
          # A count cannot tell a regression from noise: the #1072 regression
          # broke one test and left the pass count at 144, far above the floor,
          # so nothing went red and it shipped. WHICH tests fail does tell you.
          # Derive the major from the Podman the VM actually booted (the matrix
          # guard above already proved they agree), so dropping in a
          # podman-known-failures-<major> file is all it takes to gate a new
          # major — no edit here.
          major="${VER%%.*}"
          known="$GITHUB_WORKSPACE/.github/podman-known-failures-$major"
          if [ -f "$known" ]; then
            # `comm` compares bytes while `sort` orders by locale, so pin both to
            # C. Defensive rather than observed: the first-run false red was the
            # CR above, not collation, but the two must agree or comm reports
            # present entries as missing.
            LC_ALL=C
            export LC_ALL
            grep -vE '^[[:space:]]*(#|$)' "$known" | tr -d '[:blank:]' | sort -u > "$RUNNER_TEMP/known.txt"
            printf '%s' "$FAILED_TESTS" | tr ',' '\n' | sed '/^$/d' | sort -u > "$RUNNER_TEMP/failed.txt"
            unexpected="$(comm -23 "$RUNNER_TEMP/failed.txt" "$RUNNER_TEMP/known.txt")"
            if [ -n "$unexpected" ]; then
              echo "::error::Podman $VER: these failing tests are not in $(basename "$known") — a test that used to pass is failing, which is a regression, not nested-virt noise:"
              echo "$unexpected" | awk '{print "  " $0}'
              echo "If a run proves the failure is environmental, add it to that file with the evidence; do not add it to make this red go away."
              exit 1
            fi
            stale="$(comm -13 "$RUNNER_TEMP/failed.txt" "$RUNNER_TEMP/known.txt")"
            if [ -n "$stale" ]; then
              echo "::notice::Podman $VER: listed as environmentally-broken but passing in this run — drop them from $(basename "$known") once that holds:"
              echo "$stale" | awk '{print "  " $0}'
            fi
            echo "Podman $VER: every failure is on the classified list ($(wc -l < "$RUNNER_TEMP/known.txt") entries)."
          fi
          # Gate: the core must pass the baseline in .github/podman-baseline-tests.
          # A real regression breaks previously-passing tests and knocks PASS
          # below the floor; the baseline is versioned so it is bumped
          # deliberately as the suite grows rather than sitting as a magic number
          # here.
          #
          # The floor is a second, cruder signal: it catches "fewer tests ran"
          # (a suite that half-executed reports few failures and few passes),
          # which the identity gate above cannot see. It stays for both majors.
          #
          # Why the failure COUNT is still only a warning, and why Podman 6 has
          # no identity list yet: the count never separated a regression from
          # noise — measured on this lane, Podman 5 fails the same ~10
          # streaming/attach/run tests every run with ZERO connection-drop
          # signatures, so "FAIL <= drop count" would redden every run. The
          # identity gate replaces it for any major with a classified list.
          # Podman 5 has one: every entry was proved environmental by running
          # the same suite on a real host (155/155 passed) while the lane
          # reported 10 failures. Podman 6 does not, because its set carries a
          # variable tail (identities seen in 1-of-5 runs) that would redden
          # innocent pull requests — the exact failure that forced this floor
          # down from 120 to 115. Classifying it is #1039; until then Podman 6
          # keeps the floor alone, and that gap is deliberate.
          BASELINE="$(cat "$GITHUB_WORKSPACE/.github/podman-baseline-tests")"
          [ "$PASS" -ge "$BASELINE" ] || { echo "::error::core suite degraded on Podman $VER ($PASS passed, baseline >= $BASELINE) — real regression or fewer tests ran"; exit 1; }
          if [ "$FAIL" -gt "$FLAKY" ]; then
            echo "::warning::Podman $VER: $FAIL failures, $FLAKY match a connection-drop signature — the rest are the known nested-virt-unstable subset (see the failures section). Not gated until that flakiness is reduced."
          fi
          echo "GREEN: podup core PASSED on Podman $VER ($PASS tests >= baseline $BASELINE; $FAIL in the nested-virt-noisy subset)."
