name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true

permissions: {}

jobs:
  verify:
    name: Verify tag matches crate version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Validate tag format
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '${TAG}' does not match required format v<major>.<minor>.<patch>."
            exit 1
          fi

      - name: Tag must equal Cargo.toml version
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          CRATE_VERSION="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          if [ "$VERSION" != "$CRATE_VERSION" ]; then
            echo "::error::Tag ${TAG} does not match Cargo.toml version ${CRATE_VERSION}."
            exit 1
          fi
          echo "Releasing version ${VERSION}."

  build:
    name: Build ${{ matrix.asset }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: podup-linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: podup
          - asset: podup-linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            bin: podup
          - asset: podup-darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            bin: podup
          - asset: podup-darwin-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            bin: podup
          - asset: podup-windows-x86_64.exe
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bin: podup.exe
          # Cross-compiled from the x64 Windows runner: the aarch64 toolchain
          # is added with rustup, and the signing step's Python wheels are only
          # published for x64 Windows (no native arm64 wheel exists).
          - asset: podup-windows-arm64.exe
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            bin: podup.exe

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install build target
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq musl-tools
          fi
          rustup target add ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.asset }}"

      - name: Sign binary
        env:
          RELEASE_SIGN_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
          PYTHONUTF8: "1"
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        run: |
          # The panel installer/updater verifies this Ed25519 signature; a
          # release without it cannot be consumed. Fail closed when the key
          # is absent instead of publishing unsigned binaries.
          if [ -z "$RELEASE_SIGN_KEY" ]; then
            echo "::error::RELEASE_SIGN_KEY secret is not configured; refusing to release unsigned binaries."
            exit 1
          fi
          python3 -m pip install --quiet --require-hashes -r .github/scripts/sign-requirements.txt
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "${{ matrix.asset }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sig
          retention-days: 1
          if-no-files-found: error

  build-deb:
    name: Build Debian package
    needs: verify
    runs-on: ubuntu-latest
    container: debian:sid
    permissions:
      contents: read
    steps:
      - name: Install build tooling
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            ca-certificates \
            build-essential \
            dpkg-dev \
            debhelper \
            cargo \
            rustc

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Build the package
        run: |
          dpkg-checkbuilddeps
          dpkg-buildpackage -us -uc -b

      - name: Stage the .deb into the workspace
        run: |
          deb=$(ls ../podup_*_amd64.deb 2>/dev/null | head -n1)
          if [ -z "$deb" ]; then
            echo "::error::no .deb artifact was produced"
            exit 1
          fi
          cp "$deb" "$(basename "$deb")"
          echo "Staged $(basename "$deb")"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: podup-deb
          path: podup_*_amd64.deb
          retention-days: 1
          if-no-files-found: error

  build-keyring:
    name: Build apt keyring package
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Build podup-archive-keyring.deb
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: ./packaging/apt/build-keyring.sh "${TAG#v}" .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: podup-keyring
          path: podup-archive-keyring.deb
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build, build-deb, build-keyring]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Resolve Debian package name
        run: |
          deb=$(ls podup_*_amd64.deb 2>/dev/null | head -n1)
          if [ -z "$deb" ]; then
            echo "::error::Debian package artifact missing"
            exit 1
          fi
          echo "DEB=$deb" >> "$GITHUB_ENV"
          echo "Releasing Debian package $deb"

      - name: Generate checksums
        run: |
          sha256sum \
            podup-linux-x86_64 \
            podup-linux-arm64 \
            podup-darwin-arm64 \
            podup-darwin-x86_64 \
            podup-windows-x86_64.exe \
            podup-windows-arm64.exe \
            "$DEB" \
            podup-archive-keyring.deb \
            > SHA256SUMS

      - name: Sign SHA256SUMS and the Debian package
        env:
          RELEASE_SIGN_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
          PYTHONUTF8: "1"
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        run: |
          if [ -z "$RELEASE_SIGN_KEY" ]; then
            echo "::error::RELEASE_SIGN_KEY secret is not configured; refusing to release unsigned checksums."
            exit 1
          fi
          python3 -m pip install --quiet --require-hashes -r .github/scripts/sign-requirements.txt
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" SHA256SUMS
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$DEB"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            --verify-tag \
            podup-linux-x86_64 \
            podup-linux-x86_64.sig \
            podup-linux-arm64 \
            podup-linux-arm64.sig \
            podup-darwin-arm64 \
            podup-darwin-arm64.sig \
            podup-darwin-x86_64 \
            podup-darwin-x86_64.sig \
            podup-windows-x86_64.exe \
            podup-windows-x86_64.exe.sig \
            podup-windows-arm64.exe \
            podup-windows-arm64.exe.sig \
            "$DEB" \
            "$DEB.sig" \
            podup-archive-keyring.deb \
            SHA256SUMS \
            SHA256SUMS.sig \
            install.sh \
            install.ps1

      - name: Remove release artifacts
        run: rm -f podup-* podup_* SHA256SUMS SHA256SUMS.sig

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  apt-repo:
    name: Publish apt repository
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install reprepro
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq reprepro

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Build signed apt repository
        env:
          PODUP_APT_GPG_PRIVATE_KEY: ${{ secrets.PODUP_APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$PODUP_APT_GPG_PRIVATE_KEY" ]; then
            echo "::error::PODUP_APT_GPG_PRIVATE_KEY secret is not configured."
            exit 1
          fi
          ./packaging/apt/build-repo.sh public podup_*_amd64.deb podup-archive-keyring.deb

      - name: Publish to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          cd public
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "apt repository for ${TAG}"
          git branch -M gh-pages
          git push -f \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
