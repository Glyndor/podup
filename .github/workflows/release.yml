name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true

permissions: {}

jobs:
  verify:
    name: Verify tag matches crate version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Validate tag format
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '${TAG}' does not match required format v<major>.<minor>.<patch>."
            exit 1
          fi

      - name: Tag must equal Cargo.toml version
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          CRATE_VERSION="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          if [ "$VERSION" != "$CRATE_VERSION" ]; then
            echo "::error::Tag ${TAG} does not match Cargo.toml version ${CRATE_VERSION}."
            exit 1
          fi
          echo "Releasing version ${VERSION}."

      - name: Tag must be on main
        # Releases are cut only from `main` (develop → main merge, then tag).
        # Refuse a tag pushed to any other branch so an unreviewed commit can
        # never be published.
        run: |
          git fetch --unshallow --no-tags origin main 2>/dev/null \
            || git fetch --no-tags origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Tagged commit is not reachable from origin/main; releases must be cut from main."
            exit 1
          fi

      - name: Audit dependencies for known advisories
        # Gate the release on `cargo audit`: a RUSTSEC advisory in a pinned
        # dependency must block publishing, not wait for the weekly cron scan.
        run: |
          cargo install cargo-audit --version "=0.22.2" --locked
          cargo audit

  build:
    name: Build ${{ matrix.asset }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: podup-linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: podup
          - asset: podup-linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            bin: podup
          - asset: podup-darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            bin: podup
          - asset: podup-darwin-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            bin: podup
          - asset: podup-windows-x86_64.exe
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bin: podup.exe
          # Cross-compiled from the x64 Windows runner: the aarch64 toolchain
          # is added with rustup, and the signing step's Python wheels are only
          # published for x64 Windows (no native arm64 wheel exists).
          - asset: podup-windows-arm64.exe
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            bin: podup.exe

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install build target
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq musl-tools
          fi
          rustup target add ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.asset }}"

      - name: Sign binary
        env:
          GLYNDOR_RELEASE_ED25519_KEY: ${{ secrets.GLYNDOR_RELEASE_ED25519_KEY }}
          PYTHONUTF8: "1"
        run: |
          # The installer/updater verifies this Ed25519 signature; a release
          # without it cannot be consumed. Rotation is by dual-TRUST — consumers
          # bake both accepted public keys — so only the active key signs here,
          # producing the single .sig every verifier reads. Fail closed when the
          # key is absent instead of publishing unsigned binaries.
          if [ -z "$GLYNDOR_RELEASE_ED25519_KEY" ]; then
            echo "::error::GLYNDOR_RELEASE_ED25519_KEY is not configured; refusing to release unsigned binaries."
            exit 1
          fi
          # Install the signing dependencies into an isolated virtual
          # environment: a runner image may ship a different, system-managed
          # cryptography that pip can neither uninstall (no RECORD) nor write
          # over (read-only prefix). A fresh venv honours the pin on every OS.
          python3 -m venv "$RUNNER_TEMP/signvenv"
          venv_py="$RUNNER_TEMP/signvenv/bin/python"
          [ -x "$venv_py" ] || venv_py="$RUNNER_TEMP/signvenv/Scripts/python.exe"
          "$venv_py" -m pip install --quiet --require-hashes -r .github/scripts/sign-requirements.txt
          # Keys are passed via the environment, not argv, so they never appear
          # in the process argument list.
          "$venv_py" .github/scripts/sign.py "${{ matrix.asset }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sig
          retention-days: 1
          if-no-files-found: error

  build-deb:
    name: Build Debian package (${{ matrix.arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    container: debian:sid
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install build tooling
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            ca-certificates \
            build-essential \
            dpkg-dev \
            debhelper \
            cargo \
            rustc

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Build the package
        run: |
          # dpkg-buildpackage builds for the host architecture, so each runner
          # produces its own arch's .deb natively.
          dpkg-checkbuilddeps
          dpkg-buildpackage -us -uc -b

      - name: Stage the .deb into the workspace
        run: |
          deb=$(ls ../podup_*_${{ matrix.arch }}.deb 2>/dev/null | head -n1)
          if [ -z "$deb" ]; then
            echo "::error::no ${{ matrix.arch }} .deb artifact was produced"
            exit 1
          fi
          cp "$deb" "$(basename "$deb")"
          echo "Staged $(basename "$deb")"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: podup-deb-${{ matrix.arch }}
          path: podup_*_${{ matrix.arch }}.deb
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Verify both Debian packages are present
        run: |
          for arch in amd64 arm64; do
            if ! ls podup_*_${arch}.deb >/dev/null 2>&1; then
              echo "::error::Debian package artifact for ${arch} is missing"
              exit 1
            fi
          done

      - name: Generate SBOM and license attribution
        # Government/enterprise consumers require a machine-readable SBOM
        # (CycloneDX, per US EO 14028) and a third-party license attribution.
        run: |
          cargo install --locked cargo-cyclonedx --version "=0.5.9"
          cargo install --locked --features cli cargo-about --version "=0.9.0"
          cargo cyclonedx --format json --all-features
          # cargo-cyclonedx names the file after the package (podup.cdx.json),
          # so only rename when an older/different layout emitted another name —
          # mv onto itself errors ("are the same file").
          src="$(ls ./*.cdx.json | head -n1)"
          [ "$src" = "./podup.cdx.json" ] || mv "$src" podup.cdx.json
          cargo about generate about.hbs > NOTICES.html

      - name: Generate checksums
        run: |
          sha256sum \
            podup-linux-x86_64 \
            podup-linux-arm64 \
            podup-darwin-arm64 \
            podup-darwin-x86_64 \
            podup-windows-x86_64.exe \
            podup-windows-arm64.exe \
            podup_*_amd64.deb \
            podup_*_arm64.deb \
            podup.cdx.json \
            NOTICES.html \
            install.sh \
            install.ps1 \
            > SHA256SUMS

      - name: Sign SHA256SUMS and the Debian packages
        env:
          GLYNDOR_RELEASE_ED25519_KEY: ${{ secrets.GLYNDOR_RELEASE_ED25519_KEY }}
          PYTHONUTF8: "1"
        run: |
          if [ -z "$GLYNDOR_RELEASE_ED25519_KEY" ]; then
            echo "::error::GLYNDOR_RELEASE_ED25519_KEY is not configured; refusing to release unsigned checksums."
            exit 1
          fi
          # Isolated venv so the pinned cryptography is honoured regardless of
          # any system-managed copy on the runner (see the per-binary sign step).
          python3 -m venv "$RUNNER_TEMP/signvenv"
          venv_py="$RUNNER_TEMP/signvenv/bin/python"
          [ -x "$venv_py" ] || venv_py="$RUNNER_TEMP/signvenv/Scripts/python.exe"
          "$venv_py" -m pip install --quiet --require-hashes -r .github/scripts/sign-requirements.txt
          # The key is read from RELEASE_SIGN_KEY in the environment, not argv.
          "$venv_py" .github/scripts/sign.py SHA256SUMS
          for deb in podup_*_amd64.deb podup_*_arm64.deb; do
            "$venv_py" .github/scripts/sign.py "$deb"
          done
          # Sign the supply-chain artifacts so consumers can verify them offline.
          "$venv_py" .github/scripts/sign.py podup.cdx.json
          "$venv_py" .github/scripts/sign.py NOTICES.html
          # Sign the installers so a user pinning PODUP_VERSION can verify the
          # script they pipe to a shell, not just the binaries it fetches.
          "$venv_py" .github/scripts/sign.py install.sh
          "$venv_py" .github/scripts/sign.py install.ps1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            --verify-tag \
            podup-linux-x86_64 \
            podup-linux-x86_64.sig \
            podup-linux-arm64 \
            podup-linux-arm64.sig \
            podup-darwin-arm64 \
            podup-darwin-arm64.sig \
            podup-darwin-x86_64 \
            podup-darwin-x86_64.sig \
            podup-windows-x86_64.exe \
            podup-windows-x86_64.exe.sig \
            podup-windows-arm64.exe \
            podup-windows-arm64.exe.sig \
            podup_*_amd64.deb \
            podup_*_amd64.deb.sig \
            podup_*_arm64.deb \
            podup_*_arm64.deb.sig \
            SHA256SUMS \
            SHA256SUMS.sig \
            podup.cdx.json \
            podup.cdx.json.sig \
            NOTICES.html \
            NOTICES.html.sig \
            install.sh \
            install.sh.sig \
            install.ps1 \
            install.ps1.sig

      - name: Remove release artifacts
        run: rm -f podup-* podup_* podup.cdx.json* NOTICES.html* SHA256SUMS SHA256SUMS.sig install.sh.sig install.ps1.sig

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
