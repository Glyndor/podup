name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  rust:
    uses: Glyndor/.github/.github/workflows/rust-ci.yml@f72a52755c737ad4ae0a61e56ac43e2edc7280c5 # v1.1.0
    with:
      extra-test-os: "[\"macos-latest\", \"windows-latest\"]"
      podman: true
      coverage-threshold: 90
      msrv: "1.85"
      package-check: true
      semver-check: true
      doc-warnings: true
