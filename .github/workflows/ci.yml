name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  rust:
    uses: Glyndor/.github/.github/workflows/rust-ci.yml@80523422631014f591b07bc24c507145faabb271 # v1.2.0
    with:
      extra-test-os: "[\"macos-latest\", \"windows-latest\"]"
      podman: true
      coverage-threshold: 90
      msrv: "1.85"
      package-check: true
      semver-check: true
      doc-warnings: true
