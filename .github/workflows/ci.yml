name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  rust:
    uses: Glyndor/.github/.github/workflows/rust-ci.yml@b78620146d50fdbc552e1b86740e64d114c58f0f # v1.0.0
    with:
      extra-test-os: "[\"macos-latest\", \"windows-latest\"]"
      podman: true
      coverage-threshold: 90
      msrv: "1.85"
      package-check: true
      semver-check: true
      doc-warnings: true
