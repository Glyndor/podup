name: Lint shell scripts

on:
  push:
    branches:
      - develop
    paths:
      - "**.sh"
      - ".github/workflows/lint-shell.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**.sh"
      - ".github/workflows/lint-shell.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    uses: Glyndor/.github/.github/workflows/shell-ci.yml@7f386e098ac242fc82e2e9a2b5e02c50cf00eedf # v1.10.0-pre
