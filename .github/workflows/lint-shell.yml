name: Lint shell scripts

on:
  push:
    branches:
      - develop
    paths:
      - "**.sh"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**.sh"

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Syntax check
        run: bash -n install.sh

      - name: Run shellcheck
        run: shellcheck --severity=style install.sh
