version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels: ["dependencies", "type:ci"]
    open-pull-requests-limit: 10
    target-branch: "develop"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    labels: ["dependencies"]
    open-pull-requests-limit: 10
    target-branch: "develop"
