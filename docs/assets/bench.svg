<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" role="img" aria-label="podup benchmarks: ~7 MiB peak memory vs 69 MiB for podman-compose, and up to 14x faster wall-clock per op">
  <style>
    .card { fill:#0d1117; stroke:#30363d; }
    .t    { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill:#e6edf3; }
    .dim  { fill:#8b949e; }
    .pod  { fill:#3fb950; }
    .pc   { fill:#484f58; }
    .mul  { fill:#f0883e; font-weight:700; }
    .h    { fill:#e6edf3; font-weight:700; }
  </style>

  <rect class="card" x="1" y="1" width="758" height="558" rx="14"/>

  <!-- title -->
  <text class="h t" x="28" y="46" font-size="22">podup vs podman-compose</text>
  <text class="dim t" x="28" y="70" font-size="13">same Podman · same digest-pinned images · median of 10 runs · lower is better</text>

  <!-- MEMORY -->
  <text class="t h" x="28" y="112" font-size="15">Peak memory · one `up`</text>

  <text class="t" x="28" y="146" font-size="13">podup</text>
  <rect class="pod" x="150" y="134" height="16" rx="3" width="0">
    <animate attributeName="width" to="61" dur="0.9s" begin="0.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;61"/>
  </rect>
  <text class="t pod" x="222" y="146" font-size="13" opacity="0">7 MiB
    <animate attributeName="opacity" to="1" dur="0.3s" begin="1.0s" fill="freeze"/>
  </text>

  <text class="t" x="28" y="176" font-size="13">p-compose</text>
  <rect class="pc" x="150" y="164" height="16" rx="3" width="0">
    <animate attributeName="width" to="600" dur="0.9s" begin="0.35s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;600"/>
  </rect>
  <text class="t dim" x="724" y="176" font-size="13" text-anchor="end" opacity="0">69 MiB
    <animate attributeName="opacity" to="1" dur="0.3s" begin="1.15s" fill="freeze"/>
  </text>

  <!-- WALL CLOCK -->
  <text class="t h" x="28" y="232" font-size="15">Wall-clock per op · podman-compose full bar, podup the sliver</text>

  <!-- row helper: label y, podup width, podup label, pc label, mul, begin -->
  <!-- single up -->
  <text class="t" x="28" y="270" font-size="13">single up</text>
  <rect class="pod" x="190" y="258" height="16" rx="3" width="0"><animate attributeName="width" to="90"  dur="0.8s" begin="0.5s"  fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;90"/></rect>
  <rect class="pc"  x="190" y="280" height="10" rx="3" width="0" opacity="0.55"><animate attributeName="width" to="600" dur="0.8s" begin="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;600"/></rect>
  <text class="t pod" x="290" y="270" font-size="12">0.10s</text>
  <text class="t mul" x="724" y="293" font-size="12" text-anchor="end" opacity="0">6.6× slower<animate attributeName="opacity" to="1" dur="0.3s" begin="1.4s" fill="freeze"/></text>

  <!-- volume-heavy up -->
  <text class="t" x="28" y="330" font-size="13">volume-heavy up</text>
  <rect class="pod" x="190" y="318" height="16" rx="3" width="0"><animate attributeName="width" to="44"  dur="0.8s" begin="0.7s"  fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;44"/></rect>
  <rect class="pc"  x="190" y="340" height="10" rx="3" width="0" opacity="0.55"><animate attributeName="width" to="600" dur="0.8s" begin="0.8s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;600"/></rect>
  <text class="t pod" x="244" y="330" font-size="12">0.11s</text>
  <text class="t mul" x="724" y="353" font-size="12" text-anchor="end" opacity="0">14× slower<animate attributeName="opacity" to="1" dur="0.3s" begin="1.6s" fill="freeze"/></text>

  <!-- many-services up -->
  <text class="t" x="28" y="390" font-size="13">many-services up</text>
  <rect class="pod" x="190" y="378" height="16" rx="3" width="0"><animate attributeName="width" to="132" dur="0.8s" begin="0.9s"  fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;132"/></rect>
  <rect class="pc"  x="190" y="400" height="10" rx="3" width="0" opacity="0.55"><animate attributeName="width" to="600" dur="0.8s" begin="1.0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;600"/></rect>
  <text class="t pod" x="332" y="390" font-size="12">0.85s</text>
  <text class="t mul" x="724" y="413" font-size="12" text-anchor="end" opacity="0">4.5× slower<animate attributeName="opacity" to="1" dur="0.3s" begin="1.8s" fill="freeze"/></text>

  <!-- running stack ps -->
  <text class="t" x="28" y="450" font-size="13">running ps</text>
  <rect class="pod" x="190" y="438" height="16" rx="3" width="0"><animate attributeName="width" to="69"  dur="0.8s" begin="1.1s"  fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;69"/></rect>
  <rect class="pc"  x="190" y="460" height="10" rx="3" width="0" opacity="0.55"><animate attributeName="width" to="600" dur="0.8s" begin="1.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="0;600"/></rect>
  <text class="t pod" x="269" y="450" font-size="12">0.015s</text>
  <text class="t mul" x="724" y="473" font-size="12" text-anchor="end" opacity="0">8.7× slower<animate attributeName="opacity" to="1" dur="0.3s" begin="2.0s" fill="freeze"/></text>

  <!-- legend -->
  <rect class="pod" x="28" y="512" width="12" height="12" rx="2"/>
  <text class="t" x="46" y="522" font-size="12">podup</text>
  <rect class="pc" x="120" y="512" width="12" height="12" rx="2" opacity="0.55"/>
  <text class="t" x="138" y="522" font-size="12">podman-compose</text>
  <text class="t dim" x="724" y="522" font-size="11" text-anchor="end">Ryzen 7 5700X · Podman 5.4.2 · 2026-06-23</text>
</svg>
