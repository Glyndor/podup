  <text class="v" x="672" y="265">7.85 s</text>
  <text class="t" x="24" y="304">up · 12 services</text>
  <text class="l" x="168" y="329" text-anchor="end">podup</text>
  <rect x="176" y="314" width="76" height="22" rx="3" fill="#3fb950"/>
