[package]
name = "podup"
version = "0.5.1"
edition = "2021"
rust-version = "1.85"
description = "Translate and run docker-compose files on rootless Podman"
license = "Apache-2.0"
repository = "https://github.com/Glyndor/podup"
homepage = "https://github.com/Glyndor/podup"
readme = "README.md"
keywords = ["podman", "compose", "containers", "docker-compose", "rootless"]
categories = ["command-line-utilities", "virtualization"]
exclude = ["/.github", "/debian", "/docs", "/install.sh", "/tests"]

[[bin]]
name = "podup"
path = "internal/main.rs"

[lib]
name = "podup"
path = "internal/lib.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_yaml = { package = "yaml_serde", version = "0.10" }
bollard = "0.21"
clap = { version = "4", features = ["derive", "env"] }
indexmap = { version = "2", features = ["serde"] }
futures = "0.3"
tar = "0.4"
flate2 = "1.0"
bytes = "1"
walkdir = "2"
notify = "8"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[features]
test-helpers = []

[dev-dependencies]
tempfile = "3"

[workspace]

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
