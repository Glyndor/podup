[package]
name = "podup"
version = "0.3.1"
edition = "2021"

[[bin]]
name = "podup"
path = "internal/main.rs"

[lib]
name = "podup"
path = "internal/lib.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_yaml = { package = "yaml_serde", version = "0.10" }
bollard = "0.21"
clap = { version = "4", features = ["derive", "env"] }
indexmap = { version = "2", features = ["serde"] }
futures = "0.3"
libc = "0.2"
tar = "0.4"
flate2 = "1.0"
bytes = "1"
walkdir = "2"
notify = "8"

[dev-dependencies]
tempfile = "3"

[workspace]

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
