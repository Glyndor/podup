# A service with several named volumes, exercising volume create/teardown
# (down is measured with -v so the volumes are removed each iteration).
services:
  app:
    image: docker.io/library/alpine@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    command: ["sleep", "3600"]
    init: true
    volumes:
      - data1:/data1
      - data2:/data2
      - data3:/data3
      - data4:/data4
      - data5:/data5
      - data6:/data6
volumes:
  data1: {}
  data2: {}
  data3: {}
  data4: {}
  data5: {}
  data6: {}
