# One service brought up with `--scale app=5` at run time, so the harness
# measures replica fan-out cost under an identical compose input.
services:
  app:
    image: docker.io/library/alpine@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    command: ["sleep", "3600"]
    init: true
